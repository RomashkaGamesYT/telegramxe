<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ХЕ Трекер</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
}

::-webkit-scrollbar{
width:0;
background:transparent;
}

.glass-dock{
background:rgba(24,24,27,0.65);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 4px 30px rgba(0,0,0,0.5);
}

.glass-card{
background:linear-gradient(145deg,rgba(39,39,42,0.4)0%,rgba(24,24,27,0.8)100%);
border:1px solid rgba(255,255,255,0.05);
}

input::-webkit-inner-spin-button,
input::-webkit-outer-spin-button{
-webkit-appearance:none;
margin:0;
}

.fade-in{
animation:fadeIn .2s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(4px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body class="bg-zinc-950 text-zinc-300 flex justify-center min-h-screen">

<div class="w-full max-w-md relative pb-28 flex flex-col overflow-x-hidden">

<!-- HOME -->

<div id="view-home" class="app-view flex flex-col w-full fade-in">

<main class="flex flex-col gap-6 p-5 pt-8">

<header class="flex items-center justify-between">

<div>
<h1 class="text-xl font-medium text-zinc-100">
Привет, <span id="dashboard-name">User</span>!
</h1>

<p class="text-xs text-zinc-500">Сегодня</p>
</div>

<div class="w-10 h-10 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center">
<span id="dashboard-avatar" class="text-sm text-zinc-200">US</span>
</div>

</header>

<div class="glass-card rounded-2xl p-5">

<h2 id="status-title" class="text-lg text-zinc-100">
Ты сегодня ничего не ел...
</h2>

<p id="status-subtitle" class="text-sm text-zinc-500">
надо что-то съесть
</p>

<button onclick="document.getElementById('dock-btn-plate').click()"
class="mt-4 bg-zinc-100 text-zinc-900 px-5 py-2 rounded-full text-xs flex items-center gap-2">

<iconify-icon icon="solar:add-circle-linear"></iconify-icon>
Добавить ХЕ

</button>

</div>

</main>
</div>

<!-- PLATE -->

<div id="view-plate" class="app-view hidden flex-col w-full p-5 pt-8 fade-in">

<h2 class="text-lg text-zinc-100 mb-6">Тарелка</h2>

<div class="glass-card rounded-2xl p-4 flex flex-col gap-4 mb-6">

<input id="food-name" placeholder="Название продукта"
class="bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm">

<div class="flex gap-3">

<input id="food-weight" type="number" placeholder="Вес (г)"
class="bg-zinc-900 border border-zinc-800 rounded-xl p-3 w-full text-sm">

<input id="food-carbs" type="number" placeholder="Углеводы/100г"
class="bg-zinc-900 border border-zinc-800 rounded-xl p-3 w-full text-sm">

</div>

<button onclick="addFoodToPlate()"
class="bg-zinc-100 text-zinc-900 py-2.5 rounded-xl text-xs">

Добавить в тарелку

</button>

</div>

<div class="flex justify-between mb-3">

<h3 class="text-base text-zinc-200">Съедено</h3>

<div>
<span id="plate-total-xe" class="text-lg text-white">0.0</span>
<span class="text-xs text-zinc-500">ХЕ</span>
</div>

</div>

<div id="plate-food-list" class="flex flex-col gap-2">

<p id="empty-plate-msg"
class="text-xs text-zinc-600 text-center py-6">

Тарелка пока пуста

</p>

</div>

</div>

<!-- CALCULATOR -->

<div id="view-calculator" class="app-view hidden flex-col w-full p-5 pt-8 fade-in">

<h2 class="text-lg text-zinc-100 mb-6">Калькулятор ХЕ</h2>

<div class="flex flex-col gap-5">

<div class="flex gap-4">

<div class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl p-3">

<label class="text-xs text-zinc-500">Вес</label>

<input id="calc-weight" type="number"
class="w-full bg-transparent text-lg text-zinc-200">

</div>

<div class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl p-3">

<label class="text-xs text-zinc-500">Углеводы</label>

<input id="calc-carbs" type="number"
class="w-full bg-transparent text-lg text-zinc-200">

</div>

</div>

<button onclick="calculateXE()"
class="bg-zinc-100 text-zinc-900 py-3 rounded-xl text-sm">

Посчитать

</button>

<div class="flex justify-between p-5 rounded-2xl bg-zinc-900 border border-zinc-800">

<span class="text-sm text-zinc-500">Итого:</span>

<div>

<span id="calc-result" class="text-2xl text-white">0.0</span>
<span class="text-sm text-zinc-500">ХЕ</span>

</div>

</div>

</div>

</div>

<!-- PROFILE -->

<div id="view-profile" class="app-view hidden flex-col w-full p-5 pt-8 fade-in">

<h2 class="text-lg text-zinc-100 mb-6">Профиль</h2>

<input id="profile-name-input"
value="User"
oninput="updateProfileName(this.value)"
class="bg-zinc-900 border border-zinc-800 rounded-xl p-3">

</div>

<div class="h-12"></div>

<!-- DOCK -->

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-2.5rem)] max-w-[calc(28rem-2.5rem)] z-50 rounded-2xl p-1.5 flex gap-1 glass-dock">

<button id="dock-btn-home"
onclick="switchTab('view-home',this)"
class="dock-btn flex-1 py-2 rounded-xl bg-zinc-800 text-zinc-100">

Главная

</button>

<button id="dock-btn-plate"
onclick="switchTab('view-plate',this)"
class="dock-btn flex-1 py-2 rounded-xl text-zinc-500">

Тарелка

</button>

<button id="dock-btn-calc"
onclick="switchTab('view-calculator',this)"
class="dock-btn flex-1 py-2 rounded-xl text-zinc-500">

Счетчик

</button>

<button id="dock-btn-profile"
onclick="switchTab('view-profile',this)"
class="dock-btn flex-1 py-2 rounded-xl text-zinc-500">

Профиль

</button>

</nav>

</div>

<script>

function switchTab(id,btn){

document.querySelectorAll('.app-view')
.forEach(v=>{
v.classList.add('hidden')
v.classList.remove('flex')
})

let view=document.getElementById(id)

view.classList.remove('hidden')
view.classList.add('flex')

document.querySelectorAll('.dock-btn')
.forEach(b=>{
b.classList.remove('bg-zinc-800','text-zinc-100')
b.classList.add('text-zinc-500')
})

btn.classList.add('bg-zinc-800','text-zinc-100')
btn.classList.remove('text-zinc-500')

}

function updateProfileName(name){

let n=name.trim()||"User"

dashboard-name.innerText=n
dashboard-avatar.innerText=n.substring(0,2).toUpperCase()

}

let totalPlateXE=0

function addFoodToPlate(){

let name=food-name.value||"Без названия"
let w=parseFloat(food-weight.value)||0
let c=parseFloat(food-carbs.value)||0

if(!w||!c)return

let xe=((w*c)/100)/10

totalPlateXE+=xe

plate-total-xe.innerText=totalPlateXE.toFixed(1)

let item=document.createElement("div")

item.className="p-3 rounded-xl bg-zinc-900 border border-zinc-800 flex justify-between"

item.innerHTML=`
<span>${name}</span>
<span>${xe.toFixed(1)} ХЕ</span>
`

plate-food-list.appendChild(item)

}

function calculateXE(){

let w=parseFloat(calc-weight.value)||0
let c=parseFloat(calc-carbs.value)||0

let xe=((w*c)/100)/10

calc-result.innerText=xe.toFixed(1)

}

</script>

</body>
</html>
