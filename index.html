<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ХЕ Трекер</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

body{font-family:'Inter',sans-serif;}

::-webkit-scrollbar{width:0}

.glass-dock{
background:rgba(24,24,27,0.65);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.08);
}

.glass-card{
background:linear-gradient(145deg,rgba(39,39,42,0.4),rgba(24,24,27,0.8));
border:1px solid rgba(255,255,255,0.05);
}

.fade-in{animation:fadeIn .2s}

@keyframes fadeIn{
from{opacity:0;transform:translateY(4px)}
to{opacity:1;transform:translateY(0)}
}

</style>
</head>

<body class="bg-zinc-950 text-zinc-300 flex justify-center min-h-screen">

<div class="w-full max-w-md relative pb-28 flex flex-col">

<!-- HOME -->

<div id="view-home" class="app-view flex flex-col p-5 pt-8 fade-in">

<h1 class="text-xl text-zinc-100 mb-4">
Привет, <span id="dashboard-name">User</span>!
</h1>

<div class="glass-card p-5 rounded-2xl">

<h2 id="status-title" class="text-lg text-zinc-100">
Ты сегодня ничего не ел...
</h2>

<p id="status-subtitle" class="text-sm text-zinc-500">
надо что-то съесть
</p>

<button onclick="switchTab('view-plate',document.getElementById('dock-btn-plate'))"
class="mt-4 bg-zinc-100 text-zinc-900 px-5 py-2 rounded-full text-xs flex items-center gap-2">

<iconify-icon icon="solar:add-circle-linear"></iconify-icon>
Добавить ХЕ

</button>

</div>

</div>

<!-- PLATE -->

<div id="view-plate" class="app-view hidden flex-col p-5 pt-8 fade-in">

<h2 class="text-lg text-zinc-100 mb-6">Тарелка</h2>

<div class="glass-card p-4 rounded-2xl flex flex-col gap-3 mb-6">

<input id="food-name" placeholder="Название продукта"
class="bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm">

<div class="flex gap-3">

<input id="food-weight" type="number" placeholder="Вес"
class="bg-zinc-900 border border-zinc-800 rounded-xl p-3 w-full">

<input id="food-carbs" type="number" placeholder="Углеводы"
class="bg-zinc-900 border border-zinc-800 rounded-xl p-3 w-full">

</div>

<button onclick="addFoodToPlate()"
class="bg-zinc-100 text-zinc-900 py-2 rounded-xl text-xs flex items-center justify-center gap-2">

<iconify-icon icon="solar:add-circle-linear"></iconify-icon>
Добавить

</button>

</div>

<div class="flex justify-between mb-3">

<h3>Съедено</h3>

<div>
<span id="plate-total-xe">0.0</span>
<span class="text-xs text-zinc-500">ХЕ</span>
</div>

</div>

<div id="plate-food-list">
<p id="empty-plate-msg" class="text-xs text-zinc-600 text-center">
Тарелка пуста
</p>
</div>

</div>

<!-- CALCULATOR -->

<div id="view-calculator" class="app-view hidden flex-col p-5 pt-8 fade-in">

<h2 class="text-lg text-zinc-100 mb-6 flex items-center gap-2">

<iconify-icon icon="solar:calculator-linear"></iconify-icon>
Калькулятор ХЕ

</h2>

<div class="flex flex-col gap-5">

<div class="flex gap-4">

<div class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl p-3">

<label class="text-xs text-zinc-500">Вес</label>

<input id="calc-weight" type="number" oninput="calculateXE()"
class="w-full bg-transparent text-lg text-zinc-200 outline-none">

</div>

<div class="flex-1 bg-zinc-900 border border-zinc-800 rounded-xl p-3">

<label class="text-xs text-zinc-500">Углеводы</label>

<input id="calc-carbs" type="number" oninput="calculateXE()"
class="w-full bg-transparent text-lg text-zinc-200 outline-none">

</div>

</div>

<div class="bg-zinc-900 p-1 rounded-xl flex border border-zinc-800">

<button onclick="setXE(10)" class="flex-1 text-xs py-2">
10г = 1 ХЕ
</button>

<button onclick="setXE(11)" class="flex-1 text-xs py-2 bg-zinc-800">
11г = 1 ХЕ
</button>

<button onclick="setXE(12)" class="flex-1 text-xs py-2">
12г = 1 ХЕ
</button>

</div>

<div class="flex justify-between p-5 rounded-2xl bg-zinc-900 border border-zinc-800">

<span class="text-zinc-500">Итого:</span>

<div>

<span id="calc-result" class="text-2xl text-white">0.0</span>
<span class="text-zinc-500">ХЕ</span>

</div>

</div>

</div>

</div>

<!-- PROFILE -->

<div id="view-profile" class="app-view hidden flex-col p-5 pt-8 fade-in">

<h2 class="text-lg text-zinc-100 mb-6">Профиль</h2>

<input id="profile-name-input"
value="User"
oninput="updateProfileName(this.value)"
class="bg-zinc-900 border border-zinc-800 rounded-xl p-3">

</div>

<div class="h-16"></div>

<!-- DOCK -->

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-md rounded-2xl p-1 flex glass-dock">

<button id="dock-btn-home"
onclick="switchTab('view-home',this)"
class="dock-btn flex-1 flex flex-col items-center py-2 text-zinc-100">

<iconify-icon icon="solar:home-angle-linear" class="text-xl"></iconify-icon>
<span class="text-xs">Главная</span>

</button>

<button id="dock-btn-plate"
onclick="switchTab('view-plate',this)"
class="dock-btn flex-1 flex flex-col items-center py-2 text-zinc-500">

<iconify-icon icon="solar:cup-hot-linear" class="text-xl"></iconify-icon>
<span class="text-xs">Тарелка</span>

</button>

<button id="dock-btn-calc"
onclick="switchTab('view-calculator',this)"
class="dock-btn flex-1 flex flex-col items-center py-2 text-zinc-500">

<iconify-icon icon="solar:calculator-linear" class="text-xl"></iconify-icon>
<span class="text-xs">Калькулятор</span>

</button>

<button id="dock-btn-profile"
onclick="switchTab('view-profile',this)"
class="dock-btn flex-1 flex flex-col items-center py-2 text-zinc-500">

<iconify-icon icon="solar:user-circle-linear" class="text-xl"></iconify-icon>
<span class="text-xs">Профиль</span>

</button>

</nav>

</div>

<script>

function switchTab(targetId,clicked){

document.querySelectorAll(".app-view").forEach(v=>{
v.classList.add("hidden")
v.classList.remove("flex")
})

const view=document.getElementById(targetId)
view.classList.remove("hidden")
view.classList.add("flex")

}

function updateProfileName(name){

name=name.trim()||"User"

document.getElementById("dashboard-name").innerText=name

}

let xeDivider=11

function setXE(val){
xeDivider=val
calculateXE()
}

function calculateXE(){

const weight=parseFloat(document.getElementById("calc-weight").value)||0
const carbs=parseFloat(document.getElementById("calc-carbs").value)||0

if(weight===0||carbs===0){
document.getElementById("calc-result").innerText="0.0"
return
}

const xe=((carbs*weight)/100)/xeDivider

document.getElementById("calc-result").innerText=xe.toFixed(1)

}

let totalPlateXE=0

function addFoodToPlate(){

const name=document.getElementById("food-name").value||"Без названия"
const weight=parseFloat(document.getElementById("food-weight").value)||0
const carbs=parseFloat(document.getElementById("food-carbs").value)||0

if(weight===0||carbs===0)return

const xe=((weight*carbs)/100)/10

totalPlateXE+=xe

document.getElementById("plate-total-xe").innerText=totalPlateXE.toFixed(1)

const item=document.createElement("div")

item.className="flex justify-between p-3 border border-zinc-800 rounded-xl mt-2"

item.innerHTML=`<span>${name}</span><span>${xe.toFixed(1)} ХЕ</span>`

document.getElementById("plate-food-list").appendChild(item)

}

</script>

</body>
</html>
